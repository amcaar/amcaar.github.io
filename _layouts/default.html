<!DOCTYPE html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{{ page.title }}{% if page.title %} · {% endif %}{{ site.name }}</title>
		<meta name="description" content="{{ page.description | default: site.description | default: 'Amanda Calatrava - Investigadora en Cloud, Serverless e IA' }}">

		<!-- Open Graph -->
		<meta property="og:title" content="{{ page.title | default: site.name }}">
		<meta property="og:description" content="{{ page.description | default: site.description }}">
		<meta property="og:type" content="website">
		<meta property="og:url" content="{{ page.url | absolute_url }}">

		<!-- Tipografía -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

		<!-- Hojas de estilo -->
		<link rel="stylesheet" type="text/css" href="/css/pages.css">
		<link rel="stylesheet" type="text/css" href="/css/icons.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

		<!-- Aplica el tema guardado ANTES de pintar, para evitar el flash del tema incorrecto -->
		<script>
			(function () {
				var saved = localStorage.getItem('theme');
				var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
	</head>
	<body>
		<nav aria-label="Navegación principal">
			<ul>
				<li><a href="/">Home</a></li>
				<li><a href="/cv">Research</a></li>
				<li><a href="/teaching">Teaching</a></li>
				<li><a href="/outreach">Outreach</a></li>
				<li><a href="/contact">Contact</a></li>
			</ul>
			<button id="theme-toggle" type="button" aria-label="Cambiar entre modo claro y oscuro">
				<i class="fa fa-moon-o" aria-hidden="true"></i>
			</button>
		</nav>
		<div class="container">

		{{ content }}

		</div><!-- /.container -->
		<footer>
			<ul>
				<li><a class="link" href="mailto:amcaar@i3m.upv.es">email</a></li>
				<li><a class="link" href="https://github.com/amcaar">github.com/amcaar</a></li>
				<li><div itemscope itemtype="https://schema.org/Person" style="text-align: right"><a itemprop="sameAs" content="https://orcid.org/0000-0002-9018-9171" href="https://orcid.org/0000-0002-9018-9171" target="orcid.widget" rel="me noopener noreferrer" style="vertical-align:top;"><img src="https://orcid.org/sites/default/files/images/orcid_16x16.png" style="width:1em;margin-right:.5em;" alt="ORCID iD icon">https://orcid.org/0000-0002-9018-9171</a></div></li>
			</ul>
		</footer>

		<script>
			var toggleBtn = document.getElementById('theme-toggle');
			var icon = toggleBtn.querySelector('i');

			function updateIcon(theme) {
				icon.className = theme === 'dark' ? 'fa fa-sun-o' : 'fa fa-moon-o';
			}
			updateIcon(document.documentElement.getAttribute('data-theme'));

			toggleBtn.addEventListener('click', function () {
				var current = document.documentElement.getAttribute('data-theme');
				var next = current === 'dark' ? 'light' : 'dark';
				document.documentElement.setAttribute('data-theme', next);
				localStorage.setItem('theme', next);
				updateIcon(next);
			});
		</script>
	</body>
</html>
